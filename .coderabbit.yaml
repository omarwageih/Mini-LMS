# CodeRabbit Configuration
# For more options, visit https://docs.coderabbit.ai/getting-started/configuration/

language: "en-US"
reviews:
  profile: "premium" # or "focused"
  request_review_command: "review"
  auto_review:
    enabled: true
    drafts: false
  tone_instructions: "You are a senior backend engineer and security reviewer. Analyze this repository as a real production LMS system, not a student project. Focus on deep technical review, not generic advice. Be critical and precise. Treat this as a real system going to production."
  path_instructions:
    - path: "**/*"
      instructions: |
        Your tasks for this review:
        1. Architecture Review: Evaluate layering (routes, controllers, services, db). Detect tight coupling or missing abstractions. Suggest specific refactoring with file structure.
        2. Authentication & Security Audit (VERY IMPORTANT): Identify vulnerabilities in password handling (bcrypt, SHA256, plaintext fallback). Evaluate JWT implementation (expiry, refresh tokens, security risks). Detect missing protections (rate limiting, brute force, etc.). Suggest production-grade fixes with code examples.
        3. Code Quality: Identify logic placed in wrong layers (controller vs service). Check error handling patterns. Evaluate scalability and maintainability.
        4. Database Design Review: Evaluate schema design (normalization, relations). Detect missing indexes. Check soft delete, audit logs, constraints.
        5. Performance & Scalability: Identify bottlenecks in DB queries and backend logic. Suggest caching or optimization strategies.
        6. Missing Production Features: List critical missing features required for real LMS (not optional features).
        7. PRIORITIZED Improvements: Give TOP 5 improvements that will make the biggest impact. Order them by importance.
        
        IMPORTANT: Do NOT give generic advice. Reference actual patterns from the code. Output format needs clear sections, concrete issues + exact fixes, and code snippets where needed.
chat:
  enabled: true
